{% extends 'base.html' %}
{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #07090f; --surface: #0e1117; --surface2: #161b26;
    --border: #1e2a3a; --accent: #22c55e; --danger: #ef4444;
    --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

  .wrap { width: 100%; max-width: 400px; }

  .logo { text-align: center; margin-bottom: 28px; }
  .logo .icon { font-size: 44px; margin-bottom: 8px; }
  .logo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: #fff; letter-spacing: 1px; }
  .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px 24px; }

  .alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500; margin-bottom: 16px; }
  .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
  .alert-success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #86efac; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
                text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .form-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
                border-radius: 10px; color: var(--text); font-size: 15px;
                font-family: 'DM Sans', sans-serif; padding: 12px 14px; transition: border-color 0.2s; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }

  .btn-submit { width: 100%; background: linear-gradient(135deg, #16a34a, #22c55e);
                border: none; border-radius: 10px; color: #000; font-size: 15px;
                font-weight: 700; font-family: 'DM Sans', sans-serif;
                padding: 13px; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
  .btn-submit:hover { opacity: 0.88; }

  .login-link { text-align: center; font-size: 13px; color: var(--muted); margin-top: 16px; }
  .login-link a { color: var(--accent); text-decoration: none; font-weight: 600; }

@media (max-width: 768px) {
  body { padding: 12px !important; align-items: flex-start !important; padding-top: 40px !important; }
  .wrap { max-width: 100% !important; }
  .card { padding: 22px 18px !important; border-radius: 14px !important; }
  .page-header .icon { font-size: 36px !important; margin-bottom: 8px !important; }
  .page-header h1 { font-size: 26px !important; }
  .page-header p { font-size: 12px !important; }
  .form-group { margin-bottom: 14px !important; }
  .form-label { font-size: 10px !important; }
  input[type="text"], input[type="tel"], input[type="number"], input[type="password"] {
    font-size: 16px !important; padding: 13px 14px !important;
  }
  .btn-submit { padding: 13px !important; font-size: 15px !important; }
  .otp-input { font-size: 22px !important; letter-spacing: 8px !important; }
}
</style>

<div class="wrap">
  <div class="logo">
    <div class="icon">🏏</div>
    <h1>Create Account</h1>
    <p>Register with your mobile number</p>
  </div>

  <div class="card">
    {% if error %}
      <div class="alert alert-error">⚠ {{ error }}</div>
    {% endif %}
    {% if success %}
      <div class="alert alert-success">✓ {{ success }}</div>
    {% endif %}

    {% if not success %}
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Mobile Number</label>
        <input type="tel" name="mobile" class="form-input" placeholder="e.g. 9876543210" maxlength="15" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn-submit">Create Account →</button>
    </form>
    {% endif %}

    <div class="login-link">
      Already have an account? <a href="{% url 'player_login' %}">Login →</a>
    </div>
  </div>
</div>

{% endblock %}
