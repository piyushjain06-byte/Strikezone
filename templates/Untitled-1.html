<!DOCTYPE html>
<html>
<head>
    <title>Assignment 2</title>
</head>
<body>

    <!-- One heading -->
    <h2>Enter Your Name</h2>

    <!-- One paragraph -->
    <p id="output">Your name will appear here</p>

    <!-- One input field -->
    <input type="text" id="nameInput" placeholder="Enter your name">

    <!-- One button -->
    <button onclick="showName()">Submit</button>

    <script>
        function showName() {

            // Read input using value
            let name = document.getElementById("nameInput").value;

            // Display entered name using textContent
            let para = document.getElementById("output");
            para.textContent = "Hello " + name;

            // Add bold formatting using innerHTML
            para.innerHTML = "Hello <b>" + name + "</b>! Welcome.";

            // Change paragraph color to blue using style
            para.style.color = "blue";
        }
    </script>

</body>
</html>
