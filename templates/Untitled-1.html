<!DOCTYPE html>
<html>
<head>
    <title>Assignment 1</title>
    <style>
        .myPara {
            padding: 5px;
        }
    </style>
</head>
<body>

    <!-- One heading with id -->
    <h1 id="mainHeading">This is My Heading</h1>

    <!-- Three paragraphs with same class name -->
    <p class="myPara">Paragraph 1</p>
    <p class="myPara">Paragraph 2</p>
    <p class="myPara">Paragraph 3</p>

    <!-- Two div elements -->
    <div>Div 1 content</div>
    <div>Div 2 content</div>

    <!-- One button -->
    <button onclick="changeContent()">Click Me</button>

    <script>
        function changeContent() {

            // 1. Change heading color using getElementById()
            document.getElementById("mainHeading").style.color = "red";

            // 2. Change background color of all paragraphs using getElementsByClassName()
            let paras = document.getElementsByClassName("myPara");
            for (let i = 0; i < paras.length; i++) {
                paras[i].style.backgroundColor = "yellow";
            }

            // 3. Change text of all div elements using getElementsByTagName()
            let divs = document.getElementsByTagName("div");
            for (let i = 0; i < divs.length; i++) {
                divs[i].textContent = "Div text changed!";
            }

            // 4. Change first paragraph text using querySelector()
            document.querySelector(".myPara").textContent = "First paragraph changed using querySelector!";

            // 5. Change all paragraphs font size using querySelectorAll()
            let allParas = document.querySelectorAll(".myPara");
            allParas.forEach(function(p) {
                p.style.fontSize = "20px";
            });
        }
    </script>

</body>
</html>
