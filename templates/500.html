<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 - Server Error | StrikeZone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0f1e; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-container { max-width: 600px; padding: 40px 20px; text-align: center; }
    .error-code { font-size: 120px; font-weight: 900; color: #ef4444; line-height: 1; margin-bottom: 20px; }
    .error-title { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 15px; }
    .error-message { font-size: 16px; color: #64748b; margin-bottom: 30px; line-height: 1.6; }
    .error-icon { font-size: 80px; margin-bottom: 20px; }
    .btn-home { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #b45309, #f59e0b); color: #000; font-weight: 700; border-radius: 12px; text-decoration: none; transition: all 0.2s; }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.3); }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">⚠️</div>
    <div class="error-code">500</div>
    <div class="error-title">Server Error</div>
    <div class="error-message">
      Something went wrong on our end.<br>
      We're working to fix it. Please try again later.
    </div>
    <a href="/" class="btn-home">🏠 Go Home</a>
  </div>
</body>
</html>
