{% extends 'base.html' %}

{% block content %}
<style>
  .comparison-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
  .page-title { font-size: 28px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 30px; }
  .player-selector { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
  .selector-box { flex: 1; min-width: 250px; max-width: 400px; }
  .selector-label { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .selector-input { width: 100%; padding: 12px; border: 2px solid #1e2d45; border-radius: 10px; background: #111827; color: #fff; font-size: 15px; }
  .compare-btn { padding: 12px 30px; background: linear-gradient(135deg, #b45309, #f59e0b); color: #000; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; }
  .compare-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.3); }
  .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
  .player-card { background: #111827; border: 2px solid #1e2d45; border-radius: 16px; padding: 25px; }
  .player-name { font-size: 22px; font-weight: 700; color: #f59e0b; margin-bottom: 20px; text-align: center; }
  .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1e2d45; }
  .stat-label { font-size: 13px; color: #64748b; font-weight: 600; }
  .stat-value { font-size: 16px; color: #fff; font-weight: 700; }
  .section-header { font-size: 16px; font-weight: 700; color: #fff; margin: 20px 0 10px; padding-bottom: 8px; border-bottom: 2px solid #f59e0b; }
  @media (max-width: 768px) { .comparison-grid { grid-template-columns: 1fr; } }
</style>

<div class="comparison-container">
  <h1 class="page-title">⚔️ Player Comparison</h1>
  
  <div class="player-selector">
    <div class="selector-box">
      <div class="selector-label">Player 1</div>
      <select id="player1" class="selector-input">
        <option value="">Select Player 1</option>
        {% for player in all_players %}
        <option value="{{ player.id }}">{{ player.player_name }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div class="selector-box">
      <div class="selector-label">Player 2</div>
      <select id="player2" class="selector-input">
        <option value="">Select Player 2</option>
        {% for player in all_players %}
        <option value="{{ player.id }}">{{ player.player_name }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div style="display:flex;align-items:flex-end;">
      <button class="compare-btn" onclick="comparePlayers()">Compare</button>
    </div>
  </div>
  
  <div id="comparisonResults"></div>
</div>

<script>
function comparePlayers() {
  const p1 = document.getElementById('player1').value;
  const p2 = document.getElementById('player2').value;
  
  if (!p1 || !p2) {
    alert('Please select both players');
    return;
  }
  
  if (p1 === p2) {
    alert('Please select different players');
    return;
  }
  
  fetch(`/api/player-comparison/?p1=${p1}&p2=${p2}`)
    .then(res => res.json())
    .then(data => {
      displayComparison(data);
    });
}

function displayComparison(data) {
  const p1 = data.player1;
  const p2 = data.player2;
  
  const html = `
    <div class="comparison-grid">
      <div class="player-card">
        <div class="player-name">Player 1</div>
        
        <div class="section-header">🏏 Batting</div>
        <div class="stat-row"><span class="stat-label">Matches</span><span class="stat-value">${p1.batting.matches || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Runs</span><span class="stat-value">${p1.batting.runs || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Average</span><span class="stat-value">${(p1.batting.avg || 0).toFixed(2)}</span></div>
        <div class="stat-row"><span class="stat-label">Strike Rate</span><span class="stat-value">${(p1.batting.strike_rate || 0).toFixed(2)}</span></div>
        <div class="stat-row"><span class="stat-label">Fours</span><span class="stat-value">${p1.batting.fours || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Sixes</span><span class="stat-value">${p1.batting.sixes || 0}</span></div>
        
        <div class="section-header">⚾ Bowling</div>
        <div class="stat-row"><span class="stat-label">Wickets</span><span class="stat-value">${p1.bowling.wickets || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Economy</span><span class="stat-value">${(p1.bowling.economy || 0).toFixed(2)}</span></div>
        <div class="stat-row"><span class="stat-label">Runs Given</span><span class="stat-value">${p1.bowling.runs_given || 0}</span></div>
      </div>
      
      <div class="player-card">
        <div class="player-name">Player 2</div>
        
        <div class="section-header">🏏 Batting</div>
        <div class="stat-row"><span class="stat-label">Matches</span><span class="stat-value">${p2.batting.matches || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Runs</span><span class="stat-value">${p2.batting.runs || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Average</span><span class="stat-value">${(p2.batting.avg || 0).toFixed(2)}</span></div>
        <div class="stat-row"><span class="stat-label">Strike Rate</span><span class="stat-value">${(p2.batting.strike_rate || 0).toFixed(2)}</span></div>
        <div class="stat-row"><span class="stat-label">Fours</span><span class="stat-value">${p2.batting.fours || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Sixes</span><span class="stat-value">${p2.batting.sixes || 0}</span></div>
        
        <div class="section-header">⚾ Bowling</div>
        <div class="stat-row"><span class="stat-label">Wickets</span><span class="stat-value">${p2.bowling.wickets || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Economy</span><span class="stat-value">${(p2.bowling.economy || 0).toFixed(2)}</span></div>
        <div class="stat-row"><span class="stat-label">Runs Given</span><span class="stat-value">${p2.bowling.runs_given || 0}</span></div>
      </div>
    </div>
  `;
  
  document.getElementById('comparisonResults').innerHTML = html;
}
</script>
{% endblock %}
